services:
  web:
    build:
      context: .
      args:
        PHP_VERSION: ${PHP_VERSION:-8.2}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_BASE_URL: "http://localhost:${APP_PORT:-8080}"
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-research_project_manager}
      DB_USER: ${MYSQL_USER:-app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-local-development-only}
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.0
    ports:
      - "${DB_PORT_FORWARD:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-research_project_manager}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local-development-only}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local-root-development-only}
    volumes:
      - database_data:/var/lib/mysql
      - ./database/migrations/001_create_schema_versions.sql:/docker-entrypoint-initdb.d/001_create_schema_versions.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-local-root-development-only}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  phpmyadmin:
    image: phpmyadmin:5-apache
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
    depends_on:
      database:
        condition: service_healthy

volumes:
  database_data:
