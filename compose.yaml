services:
  web:
    build:
      context: .
      args:
        PHP_VERSION: ${PHP_VERSION:-8.2}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_BASE_URL: "http://localhost:${APP_PORT:-8080}"
      SESSION_IDLE_TIMEOUT: ${SESSION_IDLE_TIMEOUT:-1800}
      SESSION_ABSOLUTE_TIMEOUT: ${SESSION_ABSOLUTE_TIMEOUT:-28800}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-research_project_manager}
      DB_USER: ${MYSQL_USER:-app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-local-development-only}
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.0
    ports:
      - "${DB_PORT_FORWARD:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-research_project_manager}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local-development-only}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local-root-development-only}
    volumes:
      - database_data:/var/lib/mysql
      - ./database/migrations/001_create_schema_versions.sql:/docker-entrypoint-initdb.d/001_create_schema_versions.sql:ro
      - ./database/migrations/002_create_users.sql:/docker-entrypoint-initdb.d/002_create_users.sql:ro
      - ./database/migrations/003_add_usernames.sql:/docker-entrypoint-initdb.d/003_add_usernames.sql:ro
      - ./database/migrations/004_create_people.sql:/docker-entrypoint-initdb.d/004_create_people.sql:ro
      - ./database/migrations/005_add_project_manager_and_projects.sql:/docker-entrypoint-initdb.d/005_add_project_manager_and_projects.sql:ro
      - ./database/migrations/006_create_project_participants.sql:/docker-entrypoint-initdb.d/006_create_project_participants.sql:ro
      - ./database/migrations/007_add_person_hour_allocations.sql:/docker-entrypoint-initdb.d/007_add_person_hour_allocations.sql:ro
      - ./database/migrations/008_add_person_capacity.sql:/docker-entrypoint-initdb.d/008_add_person_capacity.sql:ro
      - ./database/migrations/009_create_work_packages.sql:/docker-entrypoint-initdb.d/009_create_work_packages.sql:ro
      - ./database/migrations/010_add_work_package_allocations.sql:/docker-entrypoint-initdb.d/010_add_work_package_allocations.sql:ro
      - ./database/migrations/011_add_annual_person_capacity.sql:/docker-entrypoint-initdb.d/011_add_annual_person_capacity.sql:ro
      - ./database/migrations/012_add_project_trash.sql:/docker-entrypoint-initdb.d/012_add_project_trash.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-local-root-development-only}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  phpmyadmin:
    image: phpmyadmin:5-apache
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
    depends_on:
      database:
        condition: service_healthy

volumes:
  database_data:
