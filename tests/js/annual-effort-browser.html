const root=document.getElementById('annual-effort-grid'),a1=document.getElementById('a1'),a2=document.getElementById('a2'),b1=document.getElementById('b1');
const checks=[];
const person=document.getElementById('person_id');person.value='1';person.dispatchEvent(new Event('change'));checks.push(document.getElementById('participation_start').value==='2027-03-01',document.getElementById('participation_end').value==='2027-10-31');

a1.focus();a1.setSelectionRange(a1.value.length,a1.value.length);a1.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true}));checks.push(document.activeElement===a2);

a1.setSelectionRange(1,1);a1.dispatchEvent(new KeyboardEvent('keydown',{key:'ArrowLeft',bubbles:true}));checks.push(document.activeElement===a1,a1.selectionStart===1);
a1.setSelectionRange(a1.value.length,a1.value.length);a1.dispatchEvent(new KeyboardEvent('keydown',{key:'ArrowDown',bubbles:true}));checks.push(document.activeElement===b1);
root.querySelector('[data-filter-participant]').value='nobody';root.querySelector('[data-filter-participant]').dispatchEvent(new Event('input',{bubbles:true}));checks.push(b1.closest('tr').hidden===false);
root.querySelector('[data-collapse-all]').click();checks.push(root.querySelector('[data-wp-id]').open===false);root.querySelector('[data-expand-all]').click();checks.push(root.querySelector('[data-wp-id]').open===true);
root.querySelector('[data-month-focus]').value='1';root.querySelector('[data-month-focus]').dispatchEvent(new Event('change'));root.querySelector('[data-month-next]').click();checks.push(root.querySelector('[data-month-focus]').value==='2',b1.value==='0.20');

const form=root.querySelector('[data-effort-form]');form.addEventListener('submit',(event)=>event.preventDefault(),{once:true});form.dispatchEvent(new Event('submit',{bubbles:true,cancelable:true}));
